                'xls': '📗', 'xlsx': '📗',
                'ppt': '📙', 'pptx': '📙',
                'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️', 'webp': '🖼️',
                'mp4': '🎬', 'avi': '🎬', 'mov': '🎬',
                'mp3': '🎵', 'wav': '🎵',
                'zip': '📦', 'rar': '📦', '7z': '📦',
                'js': '📜', 'py': '📜', 'java': '📜', 'html': '📜', 'css': '📜',
                'txt': '📄', 'md': '📄',
                'exe': '⚙️', 'dmg': '⚙️'
            };
            return icons[ext] || '📎';
        }

        // ========== 统一弹窗 (替代原生 alert / confirm / prompt) ==========
        const _uiModal = {
            resolver: null,
            cancelValue: undefined,
            keyHandler: null
        };

        function _uiPickIcon(variant) {
            const map = { info: 'ⓘ', warn: '!', danger: '!', success: '✓' };
            return map[variant] || 'ⓘ';
        }

        function _uiShowModal(opts) {
            // opts: { type, title, message, defaultValue, okText, cancelText, variant }
            _uiBindModal(); // 确保按钮事件已绑定
            return new Promise(resolve => {
                _uiModal.resolver = resolve;
                _uiModal.cancelValue =
                    opts.type === 'confirm' ? false :
                    (opts.type === 'prompt' || opts.type === 'select') ? null : undefined;

                const overlay = document.getElementById('uiModalOverlay');
                const titleEl = document.getElementById('uiModalTitle');
                const bodyEl = document.getElementById('uiModalBody');
                const inputEl = document.getElementById('uiModalInput');
                const selectEl = document.getElementById('uiModalSelect');
                const okBtn = document.getElementById('uiModalOk');
                const cancelBtn = document.getElementById('uiModalCancel');
                const iconEl = document.getElementById('uiModalIcon');

                const defaultTitles = { alert: '提示', confirm: '请确认', prompt: '输入', select: '请选择' };
                titleEl.textContent = opts.title || defaultTitles[opts.type] || '提示';
                bodyEl.textContent = opts.message || '';

                const variant = opts.variant || (opts.type === 'confirm' ? 'warn' : 'info');
                iconEl.className = 'ui-modal-icon ' + variant;
                iconEl.textContent = _uiPickIcon(variant);

                if (opts.type === 'prompt') {
                    inputEl.style.display = '';
                    selectEl.style.display = 'none';
                    inputEl.value = opts.defaultValue == null ? '' : String(opts.defaultValue);
                    inputEl.placeholder = opts.placeholder || '';
                } else if (opts.type === 'select') {
                    inputEl.style.display = 'none';
                    selectEl.style.display = '';
                    selectEl.innerHTML = '';
                    (opts.options || []).forEach(opt => {
                        const o = document.createElement('option');
                        if (typeof opt === 'string') {
                            o.value = opt;
                            o.textContent = opt;
                        } else {
                            o.value = opt.value;
                            o.textContent = opt.label || opt.value;
                        }
                        selectEl.appendChild(o);
                    });
                    if (opts.defaultValue != null) {
                        selectEl.value = String(opts.defaultValue);
                    }
                } else {
                    inputEl.style.display = 'none';
                    selectEl.style.display = 'none';
                    inputEl.value = '';
                }

                if (opts.type === 'alert') {
                    cancelBtn.style.display = 'none';
                } else {
                    cancelBtn.style.display = '';
                    cancelBtn.textContent = opts.cancelText || '取消';
                }

                okBtn.textContent = opts.okText || '确定';
                okBtn.className = 'ui-modal-btn ' + (variant === 'danger' ? 'ui-modal-btn-danger' : 'ui-modal-btn-primary');

                overlay.classList.add('open');

                if (opts.type === 'prompt') {
                    setTimeout(() => { inputEl.focus(); inputEl.select(); }, 30);
                } else if (opts.type === 'select') {
                    setTimeout(() => selectEl.focus(), 30);
                } else {
                    setTimeout(() => okBtn.focus(), 30);
                }

                _uiModal.keyHandler = (e) => {
                    if (e.key === 'Escape') {
                        e.preventDefault();
                        _uiResolveModal(_uiModal.cancelValue);
                    } else if (e.key === 'Enter') {
                        if (opts.type === 'prompt') {
                            if (document.activeElement === inputEl) {
                                e.preventDefault();
                                _uiResolveModal(inputEl.value);
                            }
                        } else if (opts.type === 'select') {
                            e.preventDefault();
                            _uiResolveModal(selectEl.value);
                        } else {
                            e.preventDefault();
                            _uiResolveModal(opts.type === 'confirm' ? true : undefined);
                        }
                    }
                };
                document.addEventListener('keydown', _uiModal.keyHandler);
            });
        }

        function _uiResolveModal(value) {
            const overlay = document.getElementById('uiModalOverlay');
            overlay.classList.remove('open');
            if (_uiModal.keyHandler) {
                document.removeEventListener('keydown', _uiModal.keyHandler);
                _uiModal.keyHandler = null;
            }
            const resolve = _uiModal.resolver;
            _uiModal.resolver = null;
            if (resolve) resolve(value);
        }

        // 公开 API
        function uiAlert(message, opts) {
            return _uiShowModal({ type: 'alert', message, ...(opts || {}) });
        }
        function uiConfirm(message, opts) {
            return _uiShowModal({ type: 'confirm', message, ...(opts || {}) });
        }
        function uiPrompt(message, defaultValue, opts) {
            return _uiShowModal({ type: 'prompt', message, defaultValue, ...(opts || {}) });
        }
        function uiSelect(message, options, opts) {
            return _uiShowModal({ type: 'select', message, options, ...(opts || {}) });
        }

        // 一次性绑定按钮 & 遮罩点击（弹窗 DOM 在脚本之后，必须等 DOM 解析完）
        function _uiBindModal() {
            const overlay = document.getElementById('uiModalOverlay');
            const okBtn = document.getElementById('uiModalOk');
            const cancelBtn = document.getElementById('uiModalCancel');
            const inputEl = document.getElementById('uiModalInput');
            const selectEl = document.getElementById('uiModalSelect');
            if (!overlay || overlay.dataset.bound === '1') return;
            overlay.dataset.bound = '1';
            okBtn.addEventListener('click', () => {
                const inputVisible = inputEl.style.display !== 'none';
                const selectVisible = selectEl.style.display !== 'none';
                if (inputVisible) {
                    _uiResolveModal(inputEl.value);
                } else if (selectVisible) {
                    _uiResolveModal(selectEl.value);
                } else if (cancelBtn.style.display === 'none') {
                    // alert
                    _uiResolveModal(undefined);
                } else {
                    // confirm
                    _uiResolveModal(true);
                }
            });
            cancelBtn.addEventListener('click', () => _uiResolveModal(_uiModal.cancelValue));
            overlay.addEventListener('click', e => {
                if (e.target === overlay) _uiResolveModal(_uiModal.cancelValue);
            });
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', _uiBindModal);
        } else {
            _uiBindModal();
        }

        // ========== 笔记列表右键菜单 ==========
        let ctxMenuNoteId = null;

        function showNoteContextMenu(event, noteId) {
            event.preventDefault();
            event.stopPropagation();
            ctxMenuNoteId = noteId;
            const menu = document.getElementById('noteContextMenu');
            menu.innerHTML = `
                <div class="context-menu-item" onclick="ctxRename()"><span class="context-menu-icon">✏️</span>重命名</div>
                <div class="context-menu-item" onclick="ctxDuplicate()"><span class="context-menu-icon">📋</span>复制为副本</div>
                <div class="context-menu-item" onclick="ctxChangeCategory()"><span class="context-menu-icon">📁</span>移动到分类...</div>
                <div class="context-menu-sep"></div>
                <div class="context-menu-item" onclick="ctxCopyText()"><span class="context-menu-icon">📝</span>复制纯文本</div>
                <div class="context-menu-item" onclick="ctxExportPdf()"><span class="context-menu-icon">🖨️</span>导出为 PDF</div>
                <div class="context-menu-item" onclick="ctxExportMarkdown()"><span class="context-menu-icon">📥</span>导出为 Markdown</div>
                <div class="context-menu-item" onclick="ctxExportHtml()"><span class="context-menu-icon">🌐</span>导出为 HTML</div>
                <div class="context-menu-sep"></div>
                <div class="context-menu-item danger" onclick="ctxDelete()"><span class="context-menu-icon">🗑️</span>删除</div>
            `;
            menu.classList.add('open');

            // 先显示再测尺寸，避免越界
            const rect = menu.getBoundingClientRect();
            let x = event.clientX, y = event.clientY;
            if (x + rect.width > window.innerWidth) x = window.innerWidth - rect.width - 4;
            if (y + rect.height > window.innerHeight) y = window.innerHeight - rect.height - 4;
            menu.style.left = Math.max(4, x) + 'px';
            menu.style.top = Math.max(4, y) + 'px';
        }

        function hideContextMenu() {
            const menu = document.getElementById('noteContextMenu');
            if (menu) menu.classList.remove('open');
            ctxMenuNoteId = null;
        }

        document.addEventListener('click', e => {
            const menu = document.getElementById('noteContextMenu');
            if (menu && !menu.contains(e.target)) hideContextMenu();
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') hideContextMenu();
        });
        window.addEventListener('scroll', hideContextMenu, true);
        window.addEventListener('resize', hideContextMenu);

        function findNoteById(id) {
            return notes.find(n => n.id === id);
        }

        // === 菜单动作 ===
        async function ctxRename() {
            const note = findNoteById(ctxMenuNoteId);
            hideContextMenu();
            if (!note) return;
            const next = await uiPrompt('请输入新标题：', note.title || '', { title: '重命名笔记', placeholder: '笔记标题' });
            if (next === null) return;
            note.title = next;
            note.updatedAt = new Date().toISOString();
            saveLocal();
            renderList();
            if (currentId === note.id) {
                const titleInput = document.getElementById('noteTitle');
                if (titleInput) titleInput.value = next;
            }
            syncToGitHub();
        }

        function ctxDuplicate() {
            const note = findNoteById(ctxMenuNoteId);
            hideContextMenu();
            if (!note) return;
            const copy = {
                id: Date.now().toString(),
                title: (note.title || '无标题') + ' (副本)',
                content: note.content,
                category: note.category,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            notes.unshift(copy);
            saveLocal();
            renderList();
            updateCount();
            selectNote(copy.id);
            syncToGitHub();
        }

        async function ctxChangeCategory() {
            const note = findNoteById(ctxMenuNoteId);
            hideContextMenu();
            if (!note) return;
            const NEW_OPTION = '__create_new__';
            const opts = categories
                .filter(c => c !== '全部')
                .map(c => ({ value: c, label: c }))
                .concat([{ value: NEW_OPTION, label: '＋ 新建分类...' }]);
            let pick = await uiSelect('选择目标分类：', opts, {
                title: '移动到分类',
                defaultValue: note.category || '未分类'
            });
            if (pick === null) return;
            if (pick === NEW_OPTION) {
                pick = await uiPrompt('请输入新分类名：', '', { title: '新建分类', placeholder: '分类名称' });
                if (pick === null) return;
            }
            const trimmed = (pick || '').trim();
            if (!trimmed) return;
            if (note.category === trimmed) return;
            note.category = trimmed;
            note.updatedAt = new Date().toISOString();
            if (!categories.includes(trimmed)) categories.push(trimmed);
            saveLocal();
            renderCategoryTabs();
            renderList();
            syncToGitHub();
        }

        function ctxCopyText() {
            const note = findNoteById(ctxMenuNoteId);
            hideContextMenu();
            if (!note) return;
            const tmp = document.createElement('div');
            tmp.innerHTML = contentToHtml(note.content || '');
            const text = tmp.innerText || tmp.textContent || '';
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(
                    () => toast('已复制纯文本'),
                    () => fallbackCopy(text)
                );
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); toast('已复制纯文本'); }
            catch (e) { uiAlert('复制失败', { variant: 'danger' }); }
            document.body.removeChild(ta);
        }

        function toast(msg) {
            const el = document.createElement('div');
            el.textContent = msg;
            el.style.cssText = 'position:fixed;left:50%;top:60px;transform:translateX(-50%);background:rgba(0,0,0,0.78);color:#fff;padding:8px 16px;border-radius:6px;font-size:13px;z-index:99999;pointer-events:none;';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1800);
        }

        function ctxExportPdf() {
            const note = findNoteById(ctxMenuNoteId);
            hideContextMenu();
            if (!note) return;
            const title = note.title || '无标题';
            const bodyHtml = contentToHtml(note.content || '');
            const hljsCss = document.querySelector('link[href*="github.min.css"]')?.href || '';
            const w = window.open('', '_blank');
            if (!w) { uiAlert('浏览器拦截了弹窗，请允许后重试', { variant: 'warn' }); return; }
            const cssLink = hljsCss ? '<link rel="stylesheet" href="' + hljsCss + '">' : '';
            const css = `body{font-family:-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;max-width:780px;margin:32px auto;padding:0 24px;color:#222;line-height:1.7;}
h1{font-size:26px;margin:0 0 8px;}
.note-meta{color:#999;font-size:12px;margin-bottom:24px;border-bottom:1px solid #eee;padding-bottom:12px;}
img{max-width:100%;height:auto;border-radius:4px;}
code{background:#f4f4f4;padding:1px 5px;border-radius:3px;font-family:Consolas,Monaco,monospace;font-size:13px;color:#c7254e;}
.code-block{margin:12px 0;border:1px solid #e5e6eb;border-radius:6px;background:#f7f8fa;overflow:hidden;}
.code-block-header{display:flex;align-items:center;justify-content:space-between;background:#eef0f3;padding:6px 12px;font-size:12px;color:#666;}
.code-block-copy{display:none;}
.code-block pre{margin:0;padding:12px 16px;overflow:auto;}
.code-block pre code{background:transparent;color:inherit;padding:0;font-size:13px;}
blockquote{border-left:3px solid #ccc;padding:4px 12px;margin:8px 0;color:#666;background:#fafafa;}
ul,ol{padding-left:24px;}
@media print {body{margin:0;padding:16px;} .code-block{break-inside:avoid;} img{break-inside:avoid;}}`;
            const doc = '<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>' + escapeHtml(title) + '</title>'
                + cssLink + '<style>' + css + '</style></head><body>'
                + '<h1>' + escapeHtml(title) + '</h1>'
                + '<div class="note-meta">' + escapeHtml(note.category || '未分类') + ' · ' + formatDate(note.updatedAt) + '</div>'
                + bodyHtml
                + '</body></html>';
            w.document.write(doc);
            w.document.close();
            setTimeout(() => { try { w.print(); } catch (e) {} }, 500);
        }

        function ctxExportHtml() {
            const note = findNoteById(ctxMenuNoteId);
            hideContextMenu();
            if (!note) return;
            const title = note.title || '无标题';
            const html = `<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>${escapeHtml(title)}</title>
<style>body{font-family:-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;max-width:780px;margin:32px auto;padding:0 24px;color:#222;line-height:1.7;}
img{max-width:100%;height:auto;}code{background:#f4f4f4;padding:1px 5px;border-radius:3px;}
.code-block{margin:12px 0;border:1px solid #e5e6eb;border-radius:6px;background:#f7f8fa;overflow:hidden;}
.code-block-header{background:#eef0f3;padding:6px 12px;font-size:12px;color:#666;}
.code-block pre{margin:0;padding:12px 16px;overflow:auto;}
blockquote{border-left:3px solid #ccc;padding:4px 12px;color:#666;background:#fafafa;}</style>
</head><body><h1>${escapeHtml(title)}</h1>${contentToHtml(note.content || '')}</body></html>`;
            downloadText(title + '.html', html, 'text/html');
        }

        function ctxExportMarkdown() {
            const note = findNoteById(ctxMenuNoteId);
            hideContextMenu();
            if (!note) return;
            const title = note.title || '无标题';
            const md = '# ' + title + '\n\n' + htmlToMarkdown(contentToHtml(note.content || ''));
            downloadText(title + '.md', md, 'text/markdown');
        }

        function downloadText(filename, text, mime) {
            const blob = new Blob([text], { type: (mime || 'text/plain') + ';charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        // 简易 HTML → Markdown 转换
        function htmlToMarkdown(html) {
            const root = document.createElement('div');
            root.innerHTML = html;

            function walk(node, ctx) {
                ctx = ctx || {};
                if (node.nodeType === 3) return node.nodeValue;
                if (node.nodeType !== 1) return '';
                const tag = node.tagName.toLowerCase();
                const kids = () => Array.from(node.childNodes).map(c => walk(c, ctx)).join('');

                if (tag === 'br') return '\n';
                if (tag === 'hr') return '\n---\n';
                if (tag === 'h1') return '\n# ' + kids().trim() + '\n\n';
                if (tag === 'h2') return '\n## ' + kids().trim() + '\n\n';
                if (tag === 'h3') return '\n### ' + kids().trim() + '\n\n';
                if (tag === 'h4') return '\n#### ' + kids().trim() + '\n\n';
                if (tag === 'strong' || tag === 'b') return '**' + kids() + '**';
                if (tag === 'em' || tag === 'i') return '*' + kids() + '*';
                if (tag === 'u') return '<u>' + kids() + '</u>';
                if (tag === 's' || tag === 'strike' || tag === 'del') return '~~' + kids() + '~~';
                if (tag === 'a') return '[' + kids() + '](' + (node.getAttribute('href') || '') + ')';
                if (tag === 'img') return '![' + (node.getAttribute('alt') || '') + '](' + (node.getAttribute('src') || '') + ')';
                if (tag === 'blockquote') return '\n' + kids().trim().split('\n').map(l => '> ' + l).join('\n') + '\n\n';
                if (tag === 'ul') {
                    return '\n' + Array.from(node.children).filter(c => c.tagName.toLowerCase() === 'li')
                        .map(li => '- ' + walk(li, ctx).trim()).join('\n') + '\n\n';
                }
                if (tag === 'ol') {
                    return '\n' + Array.from(node.children).filter(c => c.tagName.toLowerCase() === 'li')
                        .map((li, i) => (i + 1) + '. ' + walk(li, ctx).trim()).join('\n') + '\n\n';
                }
                if (tag === 'li') return kids();
                if (node.classList && node.classList.contains('code-block')) {
                    const lang = node.getAttribute('data-lang') || '';
                    const codeEl = node.querySelector('pre code');
                    const code = codeEl ? codeEl.textContent : (node.textContent || '');
                    return '\n```' + lang + '\n' + code.replace(/\n$/, '') + '\n```\n\n';
                }
                if (tag === 'pre') {
                    return '\n```\n' + (node.textContent || '').replace(/\n$/, '') + '\n```\n\n';
                }
                if (tag === 'code') return '`' + node.textContent + '`';
                if (tag === 'p' || tag === 'div') return kids() + '\n\n';
                return kids();
            }

            return walk(root).replace(/\n{3,}/g, '\n\n').trim() + '\n';
        }

        async function ctxDelete() {
            const note = findNoteById(ctxMenuNoteId);
            const id = ctxMenuNoteId;
            hideContextMenu();
            if (!note) return;
            const ok = await uiConfirm(`确定删除「${note.title || '无标题'}」？`, { variant: 'danger', okText: '删除' });
            if (!ok) return;
            notes = notes.filter(n => n.id !== id);
            saveLocal();
            if (currentId === id) {
                currentId = null;
                if (notes.length > 0) selectNote(notes[0].id);
                else document.getElementById('editor').innerHTML = '<div class="empty-state">选择或新建一个笔记</div>';
            }
            renderCategoryTabs();
            renderList();
            updateCount();
            syncToGitHub();
        }

        init();
    </script>

    <!-- 笔记右键菜单 -->
    <div id="noteContextMenu" class="context-menu" oncontextmenu="return false"></div>

    <!-- 统一弹窗 -->
    <div id="uiModalOverlay" class="ui-modal-overlay">
        <div class="ui-modal" role="dialog" aria-modal="true">
            <div class="ui-modal-header">
                <span class="ui-modal-icon info" id="uiModalIcon">i</span>
                <span class="ui-modal-title" id="uiModalTitle">提示</span>
            </div>
            <div class="ui-modal-body" id="uiModalBody"></div>
            <input id="uiModalInput" class="ui-modal-input" type="text" style="display:none;">
            <select id="uiModalSelect" class="ui-modal-select" style="display:none;"></select>
            <div class="ui-modal-actions">
                <button type="button" class="ui-modal-btn ui-modal-btn-secondary" id="uiModalCancel">取消</button>
                <button type="button" class="ui-modal-btn ui-modal-btn-primary" id="uiModalOk">确定</button>
            </div>
        </div>
    </div>
</body>
</html>
